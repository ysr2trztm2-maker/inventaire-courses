<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Inventaire Courses du Lundi</title>
  <style>
    :root {
      --bg: #f4f6f9;
      --card: #ffffff;
      --primary: #2e7d32;
      --primary-light: #e8f5e9;
      --accent: #ff6f00;
      --danger: #c62828;
      --text: #212121;
      --muted: #757575;
      --border: #e0e0e0;
      --red-low: #ffebee;
      --orange-mid: #fff8e1;
      --green-ok: #f1f8e9;
      --shadow: 0 2px 8px rgba(0,0,0,.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── Header ── */
    header {
      background: var(--primary); color: #fff;
      padding: 16px 24px; display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 2px 6px rgba(0,0,0,.2); position: sticky; top: 0; z-index: 100;
    }
    header h1 { font-size: 1.3rem; font-weight: 700; }
    header .subtitle { font-size: .8rem; opacity: .8; }
    .header-actions { display: flex; gap: 8px; }
    .btn { border: none; border-radius: 8px; padding: 8px 16px; font-size: .85rem; font-weight: 600; cursor: pointer; transition: .15s; }
    .btn-primary { background: #fff; color: var(--primary); }
    .btn-primary:hover { background: var(--primary-light); }
    .btn-accent { background: var(--accent); color: #fff; }
    .btn-accent:hover { filter: brightness(1.1); }

    /* ── Layout ── */
    .container { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }

    /* ══════════════════════════════════════════
       MOBILE — tout gérable sur iPhone
       ══════════════════════════════════════════ */
    @media (max-width: 600px) {
      /* Header */
      header { padding: 12px 14px; flex-wrap: wrap; gap: 8px; }
      header h1 { font-size: 1.1rem; }
      .header-actions { width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
      .header-actions .btn { text-align: center; padding: 10px 8px; font-size: .82rem; }

      /* Container */
      .container { padding: 14px 10px; }

      /* Stats */
      .stats { gap: 8px; margin-bottom: 16px; }
      .stat-card { padding: 12px 8px; border-radius: 10px; }
      .stat-card .num { font-size: 1.6rem; }
      .stat-card .lbl { font-size: .7rem; }

      /* Toolbar — empilée */
      .toolbar { flex-direction: column; gap: 8px; }
      .toolbar input[type=search] { min-width: unset; width: 100%; font-size: 1rem; padding: 11px 14px; }
      .toolbar select { width: 100%; font-size: .95rem; padding: 11px 12px; }

      /* Category title */
      .category-title { font-size: .8rem; }

      /* Item cards — même hauteur qu'avant */
      .item-card { padding: 14px 12px; gap: 8px; border-radius: 10px; flex-wrap: nowrap; }
      .item-name { font-size: 1rem; }
      .item-meta { font-size: .8rem; gap: 5px; }

      /* Qty buttons — 44px touch target */
      .qty-btn { width: 38px; height: 38px; font-size: 1.2rem; border-radius: 8px; }
      .qty-val  { font-size: 1.15rem; min-width: 32px; }

      /* Status badge — pastille colorée sans texte */
      .status-badge { font-size: 0 !important; padding: 0 !important; width: 12px !important; min-width: 12px !important; height: 12px !important; border-radius: 50% !important; white-space: nowrap !important; }

      /* Edit/delete icons — plus grands */
      .icon-btn { font-size: 1.2rem; padding: 6px; }

      /* Shopping panel — pas sticky sur mobile */
      .panel { position: static; border-radius: 12px; margin-top: 0; }
      .panel h2 { font-size: 1.05rem; }
      .shopping-item { padding: 12px 0; font-size: .95rem; }
      .shopping-item input[type=checkbox] { width: 22px; height: 22px; }

      /* Panel buttons — pleine largeur */
      .panel-actions { flex-direction: column; }
      .panel-actions .btn { width: 100%; padding: 13px; font-size: .9rem; text-align: center; }

      /* Modal — plein écran sur iPhone */
      .overlay { align-items: flex-end; }
      .modal {
        border-radius: 20px 20px 0 0; max-width: 100%; max-height: 92vh;
        padding: 20px 18px 32px;
      }
      .modal h3 { font-size: 1.1rem; }
      .form-row input, .form-row select { font-size: 1rem; padding: 12px 14px; }
      .form-row-2 { grid-template-columns: 1fr 1fr; gap: 10px; }
      .modal-actions .btn { padding: 13px 20px; font-size: .95rem; }
      .tag-input { font-size: .95rem; }
    }

    /* ── Stats ── */
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px; }
    .stat-card { background: var(--card); border-radius: 12px; padding: 16px; text-align: center; box-shadow: var(--shadow); }
    .stat-card .num { font-size: 2rem; font-weight: 700; }
    .stat-card .lbl { font-size: .75rem; color: var(--muted); margin-top: 2px; }
    .stat-card.alert .num { color: var(--danger); }
    .stat-card.warn .num  { color: var(--accent); }
    .stat-card.ok .num    { color: var(--primary); }

    /* ── Toolbar ── */
    .toolbar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
    .toolbar input[type=search] {
      flex: 1; min-width: 180px; padding: 9px 14px; border: 1px solid var(--border);
      border-radius: 8px; font-size: .9rem; outline: none;
    }
    .toolbar input[type=search]:focus { border-color: var(--primary); }
    .toolbar select { padding: 9px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: .85rem; background: #fff; outline: none; }

    /* ── Category sections ── */
    .category-section { margin-bottom: 20px; }
    .category-title {
      font-size: .75rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
      color: var(--muted); padding: 6px 0; border-bottom: 1px solid var(--border); margin-bottom: 10px;
      display: flex; align-items: center; gap: 8px;
    }
    .category-title span.icon { font-size: 1.1rem; }

    /* ── Item cards ── */
    .items-list { display: flex; flex-direction: column; gap: 8px; }
    .item-card {
      background: var(--card); border-radius: 10px; padding: 12px 16px;
      display: flex; align-items: center; gap: 12px; box-shadow: var(--shadow);
      border-left: 4px solid transparent; transition: .15s;
    }
    .item-card.low { border-left-color: var(--danger); background: var(--red-low); }
    .item-card.mid { border-left-color: var(--accent); background: var(--orange-mid); }
    .item-card.ok  { border-left-color: var(--primary); background: var(--green-ok); }
    .item-info { flex: 1; min-width: 0; }
    .item-name { font-weight: 600; font-size: .95rem; }
    .item-meta { font-size: .78rem; color: var(--muted); margin-top: 2px; display: flex; flex-wrap: wrap; align-items: center; gap: 4px; }
    .qty-control { display: flex; align-items: center; gap: 6px; }
    .qty-btn {
      width: 28px; height: 28px; border: none; border-radius: 6px;
      background: var(--border); font-size: 1rem; cursor: pointer; font-weight: 700;
      display: flex; align-items: center; justify-content: center; transition: .15s;
    }
    .qty-btn:hover { background: #ccc; }
    .qty-val { font-size: 1.1rem; font-weight: 700; min-width: 28px; text-align: center; }
    .status-badge { font-size: .7rem; font-weight: 700; padding: 3px 8px; border-radius: 20px; white-space: nowrap; }
    .badge-low { background: var(--danger); color: #fff; }
    .badge-mid { background: var(--accent); color: #fff; }
    .badge-ok  { background: var(--primary); color: #fff; }
    .item-actions { display: flex; gap: 4px; }
    .icon-btn { background: none; border: none; font-size: 1rem; cursor: pointer; padding: 4px; border-radius: 6px; transition: .15s; }
    .icon-btn:hover { background: var(--border); }

    /* ── Store badges ── */
    .item-stores {
      display: flex; flex-wrap: nowrap; gap: 4px; margin-top: 4px;
      overflow: hidden; max-width: 100%;
    }
    .store-badge {
      font-size: .68rem; font-weight: 600; padding: 2px 7px; border-radius: 20px;
      background: #e3f2fd; color: #1565c0; white-space: nowrap;
    }


    /* ── Modal ── */
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 200; align-items: center; justify-content: center; }
    .overlay.open { display: flex; }
    .modal { background: var(--card); border-radius: 16px; padding: 28px; width: 100%; max-width: 460px; box-shadow: 0 8px 32px rgba(0,0,0,.2); max-height: 90vh; overflow-y: auto; }
    .modal h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 20px; }
    .form-row { margin-bottom: 14px; }
    .form-row label { display: block; font-size: .8rem; font-weight: 600; color: var(--muted); margin-bottom: 5px; }
    .form-row input, .form-row select {
      width: 100%; padding: 10px 12px; border: 1px solid var(--border);
      border-radius: 8px; font-size: .9rem; outline: none;
    }
    .form-row input:focus, .form-row select:focus { border-color: var(--primary); }
    .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .modal-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }
    .btn-ghost { background: none; border: 1px solid var(--border); color: var(--text); }
    .btn-ghost:hover { background: var(--bg); }
    .btn-danger { background: none; border: 1px solid var(--danger); color: var(--danger); }
    .btn-danger:hover { background: #fdecea; }

    /* ── Tag input (stores) ── */
    .tag-input-wrap {
      border: 1px solid var(--border); border-radius: 8px;
      padding: 6px 8px; display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
      cursor: text; transition: border-color .15s; min-height: 44px;
    }
    .tag-input-wrap:focus-within { border-color: var(--primary); }
    .tag-chip {
      background: #e3f2fd; color: #1565c0; border-radius: 20px;
      padding: 3px 8px 3px 10px; font-size: .82rem; font-weight: 600;
      display: flex; align-items: center; gap: 5px; white-space: nowrap;
    }
    .tag-chip button {
      background: none; border: none; cursor: pointer; font-size: .9rem;
      color: #1565c0; padding: 0; line-height: 1; opacity: .7;
    }
    .tag-chip button:hover { opacity: 1; }
    .tag-input {
      border: none; outline: none; font-size: .88rem; flex: 1; min-width: 100px;
      padding: 3px 4px; background: transparent;
    }
    .tag-hint { font-size: .72rem; color: var(--muted); margin-top: 4px; }

    /* ── Mode courses (iPhone) ── */
    #mobile-overlay {
      display: none; position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      width: 100vw; height: 100vh;
      background: #f0f4f0; z-index: 9999;
      -webkit-flex-direction: column; flex-direction: column; overflow: hidden;
    }
    #mobile-overlay.open { display: -webkit-flex; display: flex; }
    .mob-header {
      background: var(--primary); color: #fff; padding: 14px 16px;
      display: flex; align-items: center; gap: 12px; flex-shrink: 0;
    }
    .mob-header h2 { flex: 1; font-size: 1.1rem; font-weight: 700; }
    .mob-close {
      background: rgba(255,255,255,.2); border: none; color: #fff;
      border-radius: 8px; padding: 8px 14px; font-size: .9rem; font-weight: 700; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .mob-btn-validate {
      background: #fff; color: var(--primary); border: none;
      border-radius: 8px; padding: 8px 14px; font-size: .9rem; font-weight: 700;
      cursor: pointer; -webkit-tap-highlight-color: transparent; white-space: nowrap;
    }
    .mob-btn-validate:active { filter: brightness(.9); }
    /* Store filter bar */
    .mob-store-bar {
      background: #fff; border-bottom: 1px solid var(--border);
      padding: 10px 12px; display: flex; gap: 8px; overflow-x: auto;
      flex-shrink: 0; -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .mob-store-bar::-webkit-scrollbar { display: none; }
    .mob-store-chip {
      border: 2px solid var(--border); border-radius: 20px;
      padding: 6px 14px; font-size: .85rem; font-weight: 600;
      white-space: nowrap; cursor: pointer; background: #fff; color: var(--muted);
      -webkit-tap-highlight-color: transparent; transition: .15s;
    }
    .mob-store-chip.active {
      background: #1565c0; border-color: #1565c0; color: #fff;
    }
    .mob-progress {
      background: #fff; padding: 8px 16px; border-bottom: 1px solid var(--border);
      font-size: .83rem; color: var(--muted); display: flex; align-items: center; gap: 10px; flex-shrink: 0;
    }
    .mob-progress-bar { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .mob-progress-fill { height: 100%; background: var(--primary); border-radius: 3px; transition: width .3s; }
    .mob-body { flex: 1; overflow-y: auto; padding: 8px 0 32px; -webkit-overflow-scrolling: touch; min-height: 0; }
    .mob-store-header {
      background: #1565c0; color: #fff; padding: 10px 16px;
      font-size: .85rem; font-weight: 700; letter-spacing: .05em; text-transform: uppercase;
      position: sticky; top: 0; z-index: 10;
    }
    .mob-item {
      background: #fff; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0;
      min-height: 64px; transition: background .15s;
    }
    .mob-item.checked { background: #f5f5f5; }
    .mob-check-area {
      width: 64px; height: 64px; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; cursor: pointer;
    }
    .mob-checkbox {
      width: 28px; height: 28px; border-radius: 50%; border: 2.5px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; transition: .15s; flex-shrink: 0;
    }
    .mob-item.checked .mob-checkbox { background: var(--primary); border-color: var(--primary); color: #fff; }
    .mob-item-label { flex: 1; padding: 12px 8px 12px 0; }
    .mob-item-name { font-size: 1.05rem; font-weight: 600; color: var(--text); }
    .mob-item.checked .mob-item-name { text-decoration: line-through; color: #aaa; }
    .mob-item-sub { font-size: .78rem; color: var(--muted); margin-top: 3px; }
    /* Qty adjuster */
    .mob-qty-ctrl {
      display: flex; align-items: center; gap: 0;
      padding: 0 12px 0 4px; flex-shrink: 0;
    }
    .mob-qty-btn {
      width: 36px; height: 44px; border: none; background: none;
      font-size: 1.4rem; font-weight: 300; color: var(--primary);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    .mob-qty-btn:active { background: #e8f5e9; border-radius: 8px; }
    .mob-qty-num {
      font-size: 1.1rem; font-weight: 700; color: var(--accent);
      min-width: 28px; text-align: center;
    }
    .mob-item.checked .mob-qty-num { color: #bbb; }
    .mob-done-banner {
      display: none; text-align: center; padding: 40px 24px;
      font-size: 1.2rem; font-weight: 700; color: var(--primary);
    }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: #333; color: #fff; padding: 10px 20px; border-radius: 8px; font-size: .85rem;
      transition: transform .3s; z-index: 999; pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<header>
  <div>
    <h1>🛒 Inventaire Courses</h1>
    <div class="subtitle">Mis à jour chaque lundi</div>
  </div>
  <div class="header-actions">
    <button class="btn btn-primary" onclick="openModal()">+ Ajouter</button>
    <button class="btn" style="background:#fff3e0;color:#e65100;font-weight:700;" onclick="openMobile()">📱 Courses</button>
  </div>
</header>

<div class="container">
  <div class="stats">
    <div class="stat-card alert"><div class="num" id="stat-low">0</div><div class="lbl">À acheter</div></div>
    <div class="stat-card warn"><div class="num" id="stat-mid">0</div><div class="lbl">Presque vide</div></div>
    <div class="stat-card ok"><div class="num" id="stat-ok">0</div><div class="lbl">En stock</div></div>
  </div>

  <div class="toolbar">
    <input type="search" id="search" placeholder="Rechercher un article..." oninput="render()" />
    <select id="filter-cat" onchange="render()"><option value="">Toutes les catégories</option></select>
    <select id="filter-status" onchange="render()">
      <option value="">Tous les statuts</option>
      <option value="low">À acheter</option>
      <option value="mid">Presque vide</option>
      <option value="ok">En stock</option>
    </select>
    <select id="filter-store" onchange="render()"><option value="">Tous les magasins</option></select>
  </div>
  <div id="inventory-list"></div>
</div>

<!-- Modal -->
<div class="overlay" id="overlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <h3 id="modal-title">Ajouter un article</h3>
    <div class="form-row">
      <label>Nom de l'article *</label>
      <input type="text" id="f-name" placeholder="ex: Lait 2%" />
    </div>
    <div class="form-row">
      <label>Catégorie</label>
      <select id="f-cat">
        <option value="Fruits & légumes">🥦 Fruits &amp; légumes</option>
        <option value="Protéines animales">🥩 Protéines animales</option>
        <option value="Produits laitiers">🥛 Produits laitiers</option>
        <option value="Féculents & céréales">🌾 Féculents &amp; céréales</option>
        <option value="Conserves & bocaux">🥫 Conserves &amp; bocaux</option>
        <option value="Épicerie salée">🧂 Épicerie salée</option>
        <option value="Épicerie sucrée">🍯 Épicerie sucrée</option>
        <option value="Boissons">🥤 Boissons</option>
        <option value="Hygiène personnelle">🧴 Hygiène personnelle</option>
        <option value="Entretien maison">🧹 Entretien maison</option>
        <option value="Produits jetables">🗑️ Produits jetables</option>
        <option value="Autre">📦 Autre</option>
      </select>
    </div>
    <div class="form-row-2">
      <div class="form-row" style="margin-bottom:0">
        <label>Quantité actuelle</label>
        <input type="number" id="f-qty" min="0" value="0" />
      </div>
      <div class="form-row" style="margin-bottom:0">
        <label>Seuil minimum</label>
        <input type="number" id="f-min" min="0" value="1" />
      </div>
    </div>
    <div class="form-row" style="margin-top:14px">
      <label>Unité</label>
      <input type="text" id="f-unit" placeholder="ex: litres, kg, unités, cannettes..." />
    </div>
    <div class="form-row">
      <label>🏪 Magasins préférés</label>
      <div class="tag-input-wrap" id="store-tags-wrap" onclick="document.getElementById('f-store-input').focus()">
        <div id="store-tags"></div>
        <input type="text" id="f-store-input" class="tag-input" placeholder="Ajouter un magasin..." list="store-datalist" autocomplete="off" />
        <datalist id="store-datalist"></datalist>
      </div>
      <div class="tag-hint">Appuie sur Entrée ou , pour ajouter · Clic × pour retirer</div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-danger" id="btn-delete" onclick="deleteCurrentItem()" style="display:none;margin-right:auto;">🗑️ Supprimer</button>
      <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
      <button class="btn btn-accent" onclick="saveItem()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- Mode courses iPhone -->
<div id="mobile-overlay">
  <div class="mob-header">
    <h2>🛒 Courses</h2>
    <button class="mob-btn-validate" onclick="validateMobile()">✓ Terminer</button>
    <button class="mob-close" onclick="closeMobile()">✕ Fermer</button>
  </div>
  <div class="mob-store-bar" id="mob-store-bar"></div>
  <div class="mob-progress">
    <span id="mob-progress-text">0 / 0</span>
    <div class="mob-progress-bar"><div class="mob-progress-fill" id="mob-progress-fill" style="width:0%"></div></div>
  </div>
  <div class="mob-body" id="mob-body">
    <div class="mob-done-banner" id="mob-done-banner">✅ Tout est coché !<br>Bonne semaine !</div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── Data ──────────────────────────────────────────────────────────────────
const STORE_KEY = 'inventaire_v3';
let items = [];
let editId = null;
let modalStores = [];      // stores being edited in the modal

const CATEGORY_ICONS = {
  'Fruits & légumes':      '🥦',
  'Protéines animales':    '🥩',
  'Produits laitiers':     '🥛',
  'Féculents & céréales':  '🌾',
  'Conserves & bocaux':    '🥫',
  'Épicerie salée':        '🧂',
  'Épicerie sucrée':       '🍯',
  'Boissons':              '🥤',
  'Hygiène personnelle':   '🧴',
  'Entretien maison':      '🧹',
  'Produits jetables':     '🗑️',
  'Autre':                 '📦',
};

function load() {
  // Try v2 first, then migrate v1
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) { items = JSON.parse(raw); return; }
    const old = localStorage.getItem('inventaire_v1');
    if (old) {
      items = JSON.parse(old).map(i => ({
        ...i,
        stores: i.store ? [i.store] : [],
        store: undefined,
      }));
      save();
      return;
    }
  } catch {}
  items = getDefaults();
}

function save() { localStorage.setItem(STORE_KEY, JSON.stringify(items)); }

function getStatus(item) {
  if (item.qty <= 0) return 'low';
  if (item.qty <= item.min) return 'mid';
  return 'ok';
}

// ── All stores across all items ───────────────────────────────────────────
function allStores() {
  return [...new Set(items.flatMap(i => i.stores || []))].sort();
}

// ── Defaults ─────────────────────────────────────────────────────────────
function getDefaults() {

// ── Render ────────────────────────────────────────────────────────────────
function render() {
  const search      = document.getElementById('search').value.toLowerCase();
  const catFilter   = document.getElementById('filter-cat').value;
  const statusFilter= document.getElementById('filter-status').value;
  const storeFilter = document.getElementById('filter-store').value;

  // Refresh dropdowns
  const cats = [...new Set(items.map(i => i.cat))].sort();
  const catSel = document.getElementById('filter-cat');
  const curCat = catSel.value;
  catSel.innerHTML = '<option value="">Toutes les catégories</option>' +
    cats.map(c => `<option value="${c}"${c===curCat?' selected':''}>${CATEGORY_ICONS[c]||'📦'} ${c}</option>`).join('');

  const stores = allStores();
  const storeSel = document.getElementById('filter-store');
  const curStore = storeSel.value;
  storeSel.innerHTML = '<option value="">Tous les magasins</option>' +
    stores.map(s => `<option value="${s}"${s===curStore?' selected':''}>${s}</option>`).join('');

  // Datalist for modal
  document.getElementById('store-datalist').innerHTML =
    stores.map(s => `<option value="${s}">`).join('');

  // Filter
  const filtered = items.filter(item => {
    if (!item.name.toLowerCase().includes(search)) return false;
    if (catFilter && item.cat !== catFilter) return false;
    if (statusFilter && getStatus(item) !== statusFilter) return false;
    if (storeFilter && !(item.stores||[]).includes(storeFilter)) return false;
    return true;
  });

  // Group by category
  const grouped = {};
  filtered.forEach(item => {
    if (!grouped[item.cat]) grouped[item.cat] = [];
    grouped[item.cat].push(item);
  });

  const container = document.getElementById('inventory-list');
  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty-list" style="padding:40px;text-align:center;color:#999">Aucun article trouvé.</div>';
    updateStats(); return;
  }

  container.innerHTML = Object.entries(grouped).sort(([a],[b])=>a.localeCompare(b)).map(([cat, catItems]) => `
    <div class="category-section">
      <div class="category-title"><span class="icon">${CATEGORY_ICONS[cat]||'📦'}</span>${cat}</div>
      <div class="items-list">${catItems.sort((a,b)=>a.name.localeCompare(b.name)).map(itemCard).join('')}</div>
    </div>`).join('');

  updateStats();
}

function itemCard(item) {
  const st = getStatus(item);
  const badgeText = st==='low' ? '⚠ À acheter' : st==='mid' ? '↓ Presque vide' : '✓ En stock';
  const storeTags = (item.stores||[]).map(s => `<span class="store-badge">🏪 ${s}</span>`).join('');
  return `
    <div class="item-card ${st}" id="card-${item.id}">
      <div class="item-info">
        <div class="item-name">${item.name}</div>
        <div class="item-meta">
          ${item.unit ? `<span>${item.unit}</span><span>·</span>` : ''}
          <span>Min: ${item.min}</span>
        </div>
        ${storeTags ? `<div class="item-stores">${storeTags}</div>` : ''}
      </div>
      <div class="qty-control">
        <button class="qty-btn" onclick="changeQty('${item.id}',-1)">−</button>
        <span class="qty-val">${item.qty}</span>
        <button class="qty-btn" onclick="changeQty('${item.id}',+1)">+</button>
      </div>
      <div class="item-actions">
        <button class="icon-btn" title="Modifier" onclick="openModal('${item.id}')">✏️</button>
      </div>
    </div>`;
}

function updateStats() {
  document.getElementById('stat-low').textContent = items.filter(i=>getStatus(i)==='low').length;
  document.getElementById('stat-mid').textContent = items.filter(i=>getStatus(i)==='mid').length;
  document.getElementById('stat-ok').textContent  = items.filter(i=>getStatus(i)==='ok').length;
}

// ── Qty actions ───────────────────────────────────────────────────────────
function changeQty(id, delta) {
  const item = items.find(i=>i.id===id);
  if (!item) return;
  item.qty = Math.max(0, item.qty + delta);
  save(); render();
}

function deleteItem(id) {
  if (!confirm('Supprimer cet article?')) return;
  items = items.filter(i=>i.id!==id);
  save(); render();
  toast('Article supprimé');
}

function deleteCurrentItem() {
  if (!editId) return;
  if (!confirm('Supprimer cet article?')) return;
  items = items.filter(i=>i.id!==editId);
  save(); render();
  closeModal();
  toast('Article supprimé');
}

// ── Modal ─────────────────────────────────────────────────────────────────
function openModal(id = null) {
  editId = id;
  document.getElementById('modal-title').textContent = id ? "Modifier l'article" : 'Ajouter un article';
  document.getElementById('btn-delete').style.display = id ? '' : 'none';
  if (id) {
    const item = items.find(i=>i.id===id);
    document.getElementById('f-name').value = item.name;
    document.getElementById('f-cat').value  = item.cat;
    document.getElementById('f-qty').value  = item.qty;
    document.getElementById('f-min').value  = item.min;
    document.getElementById('f-unit').value = item.unit || '';
    modalStores = [...(item.stores || [])];
  } else {
    document.getElementById('f-name').value = '';
    document.getElementById('f-qty').value  = '0';
    document.getElementById('f-min').value  = '1';
    document.getElementById('f-unit').value = '';
    modalStores = [];
  }
  document.getElementById('f-store-input').value = '';
  renderModalTags();
  document.getElementById('overlay').classList.add('open');
  setTimeout(() => document.getElementById('f-name').focus(), 50);
}

function renderModalTags() {
  document.getElementById('store-tags').innerHTML = modalStores.map((s,i) => `
    <span class="tag-chip">${s}<button type="button" onclick="removeModalStore(${i})" title="Retirer">×</button></span>`).join('');
}

function addModalStore(name) {
  const val = name.trim();
  if (!val || modalStores.includes(val)) return;
  modalStores.push(val);
  renderModalTags();
}

function removeModalStore(idx) {
  modalStores.splice(idx, 1);
  renderModalTags();
}

document.addEventListener('DOMContentLoaded', () => {
  const inp = document.getElementById('f-store-input');
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ',') {
      e.preventDefault();
      addModalStore(inp.value);
      inp.value = '';
    } else if (e.key === 'Backspace' && inp.value === '' && modalStores.length > 0) {
      removeModalStore(modalStores.length - 1);
    }
  });
  // Also handle when user picks from datalist (change event fires)
  inp.addEventListener('change', () => {
    if (inp.value) { addModalStore(inp.value); inp.value = ''; }
  });
});

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  editId = null;
}

function closeModalOutside(e) {
  if (e.target === document.getElementById('overlay')) closeModal();
}

function saveItem() {
  // Flush any typed-but-not-confirmed store
  const inp = document.getElementById('f-store-input');
  if (inp.value.trim()) { addModalStore(inp.value); inp.value = ''; }

  const name = document.getElementById('f-name').value.trim();
  if (!name) { alert('Le nom est obligatoire.'); return; }
  const data = {
    name,
    cat:    document.getElementById('f-cat').value,
    qty:    parseInt(document.getElementById('f-qty').value) || 0,
    min:    parseInt(document.getElementById('f-min').value) || 1,
    unit:   document.getElementById('f-unit').value.trim(),
    stores: [...modalStores],
  };
  if (editId) {
    const idx = items.findIndex(i=>i.id===editId);
    items[idx] = { ...items[idx], ...data };
    toast('Article modifié');
  } else {
    items.push({ id: uid(), ...data });
    toast('Article ajouté');
  }
  save(); closeModal(); render();
}


// ── Mode courses iPhone ───────────────────────────────────────────────────
let mobChecked    = {}; // itemId → bool
let mobTakeQty    = {}; // itemId → quantity to take
let mobAllToBuy   = []; // full list before store filter
let mobActiveStore = 'tous'; // current store filter
let mobCollapsed  = {}; // cat → bool

const MOB_CHECKED_KEY  = 'mob_checked';
const MOB_QTY_KEY      = 'mob_qty';

function mobSaveState() {
  localStorage.setItem(MOB_CHECKED_KEY, JSON.stringify(mobChecked));
  localStorage.setItem(MOB_QTY_KEY,     JSON.stringify(mobTakeQty));
}
function mobLoadState() {
  try { mobChecked = JSON.parse(localStorage.getItem(MOB_CHECKED_KEY)) || {}; } catch { mobChecked = {}; }
  try { mobTakeQty = JSON.parse(localStorage.getItem(MOB_QTY_KEY))     || {}; } catch { mobTakeQty = {}; }
}
function mobClearState() {
  mobChecked = {}; mobTakeQty = {};
  localStorage.removeItem(MOB_CHECKED_KEY);
  localStorage.removeItem(MOB_QTY_KEY);
}

function openMobile() {
  mobAllToBuy = items.filter(i => getStatus(i) !== 'ok')
    .sort((a,b) => a.cat.localeCompare(b.cat) || a.name.localeCompare(b.name));

  mobActiveStore = 'tous';

  // Restore saved state (coches + quantités)
  mobLoadState();

  // Init take quantities seulement pour les nouveaux articles
  mobAllToBuy.forEach(item => {
    if (mobTakeQty[item.id] === undefined)
      mobTakeQty[item.id] = Math.max(1, item.min - item.qty);
  });

  // Build store chips — only stores that have items to buy
  const storesWithItems = [...new Set(
    mobAllToBuy.flatMap(i => (i.stores && i.stores.length) ? i.stores : [])
  )].sort();

  const bar = document.getElementById('mob-store-bar');
  if (storesWithItems.length > 0) {
    bar.style.display = '';
    bar.innerHTML = '<button class="mob-store-chip active" id="mob-chip-tous" onclick="mobFilterStore(\'tous\')">🛒 Tous</button>'
      + storesWithItems.map(s =>
          '<button class="mob-store-chip" id="mob-chip-' + s.replace(/\W/g,'_') + '" onclick="mobFilterStore(\'' + s.replace(/'/g,"\\'") + '\')">' + s + '</button>'
        ).join('');
  } else {
    bar.style.display = 'none';
  }

  renderMobList();
  document.getElementById('mobile-overlay').classList.add('open');
  document.documentElement.style.overflow = 'hidden';
}

function mobFilterStore(store) {
  mobActiveStore = store;
  // Update chip styles
  document.querySelectorAll('.mob-store-chip').forEach(c => c.classList.remove('active'));
  const key = store === 'tous' ? 'tous' : store.replace(/\W/g,'_');
  const chip = document.getElementById('mob-chip-' + key);
  if (chip) chip.classList.add('active');
  renderMobList();
}

function renderMobList() {
  const filtered = mobActiveStore === 'tous'
    ? mobAllToBuy
    : mobAllToBuy.filter(i => (i.stores || []).includes(mobActiveStore));

  const body = document.getElementById('mob-body');

  if (filtered.length === 0) {
    body.innerHTML = '<div style="text-align:center;padding:60px 24px;font-size:1.05rem;color:#2e7d32;font-weight:700;">✅ Tout est en stock ici !<br><span style="font-weight:400;font-size:.9rem;color:#757575">Rien à acheter dans ce magasin.</span></div>';
    updateMobProgress(0, 0);
    return;
  }

  // Group by category
  const grouped = {};
  filtered.forEach(item => {
    if (!grouped[item.cat]) grouped[item.cat] = [];
    grouped[item.cat].push(item);
  });

  body.innerHTML = Object.entries(grouped).sort(([a],[b]) => a.localeCompare(b)).map(([cat, catItems]) => {
    const collapsed = !!mobCollapsed[cat];
    const doneInCat = catItems.filter(i => mobChecked[i.id]).length;
    const allDone   = doneInCat === catItems.length;
    const catKey    = cat.replace(/[^a-zA-Z0-9]/g, '_');

    const itemsHtml = catItems.map(item => {
      const checked = mobChecked[item.id] || false;
      const storesBadges = (item.stores && item.stores.length)
        ? item.stores.map(s => '<span style="background:#e3f2fd;color:#1565c0;border-radius:20px;padding:2px 8px;font-size:.72rem;font-weight:600;margin-right:3px;">🏪 ' + s + '</span>').join('')
        : '';
      return '<div class="mob-item' + (checked ? ' checked' : '') + '" id="mobrow-' + item.id + '" data-id="' + item.id + '">'
        + '<div class="mob-check-area" onclick="mobToggle(\'' + item.id + '\')">'
        +   '<div class="mob-checkbox" id="mobchk-' + item.id + '">' + (checked ? '✓' : '') + '</div>'
        + '</div>'
        + '<div class="mob-item-label" onclick="mobToggle(\'' + item.id + '\')">'
        +   '<div class="mob-item-name">' + item.name + '</div>'
        +   (storesBadges && mobActiveStore === 'tous' ? '<div class="mob-item-sub">' + storesBadges + '</div>' : '')
        + '</div>'
        + '<div class="mob-qty-ctrl">'
        +   '<button class="mob-qty-btn" onclick="mobAdjustQty(\'' + item.id + '\',-1)">−</button>'
        +   '<span class="mob-qty-num" id="mobqty-' + item.id + '">' + (mobTakeQty[item.id] || 1) + '</span>'
        +   '<button class="mob-qty-btn" onclick="mobAdjustQty(\'' + item.id + '\',1)">+</button>'
        + '</div>'
        + '</div>';
    }).join('');

    const badge = allDone
      ? '<span style="margin-left:auto;font-size:.75rem;color:#2e7d32;font-weight:700;">✅ Fait</span>'
      : (doneInCat > 0 ? '<span style="margin-left:auto;font-size:.75rem;color:#f57c00;font-weight:600;">' + doneInCat + '/' + catItems.length + '</span>' : '<span style="margin-left:auto;font-size:.75rem;color:#bbb;">' + catItems.length + '</span>');

    return '<div onclick="mobToggleCat(\'' + catKey + '\')" style="display:flex;align-items:center;gap:8px;padding:10px 16px;font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:' + (allDone ? '#2e7d32' : '#555') + ';background:' + (allDone ? '#f1f8e9' : '#f0f0f0') + ';border-bottom:1px solid #ddd;cursor:pointer;user-select:none;">'
      + '<span>' + (CATEGORY_ICONS[cat] || '📦') + ' ' + cat + '</span>'
      + badge
      + '<span id="mobcatarrow-' + catKey + '" style="font-size:.9rem;color:#aaa;margin-left:4px;">' + (collapsed ? '▶' : '▼') + '</span>'
      + '</div>'
      + '<div id="mobcat-' + catKey + '" style="' + (collapsed ? 'display:none;' : '') + '">'
      + itemsHtml
      + '</div>';
  }).join('');

  const done = filtered.filter(i => mobChecked[i.id]).length;
  updateMobProgress(filtered.length, done);
}

function mobToggleCat(catKey) {
  mobCollapsed[catKey] = !mobCollapsed[catKey];
  const el = document.getElementById('mobcat-' + catKey);
  if (el) el.style.display = mobCollapsed[catKey] ? 'none' : '';
  const arrow = document.getElementById('mobcatarrow-' + catKey);
  if (arrow) arrow.textContent = mobCollapsed[catKey] ? '▶' : '▼';
}

function mobAdjustQty(itemId, delta) {
  const current = mobTakeQty[itemId] || 1;
  const next = Math.max(1, current + delta);
  mobTakeQty[itemId] = next;
  const el = document.getElementById('mobqty-' + itemId);
  if (el) el.textContent = next;
  mobSaveState();
}

function mobToggle(itemId) {
  mobChecked[itemId] = !mobChecked[itemId];
  const checked = mobChecked[itemId];

  const row = document.getElementById('mobrow-' + itemId);
  if (row) {
    row.classList.toggle('checked', checked);
    row.querySelector('.mob-checkbox').textContent = checked ? '✓' : '';
  }

  // Ne pas toucher au stock ici — seulement à la validation finale
  mobSaveState();

  // Refresh progress for current filter
  const filtered = mobActiveStore === 'tous'
    ? mobAllToBuy
    : mobAllToBuy.filter(i => (i.stores || []).includes(mobActiveStore));
  const done = filtered.filter(i => mobChecked[i.id]).length;
  updateMobProgress(filtered.length, done);
}

function updateMobProgress(total, done = 0) {
  document.getElementById('mob-progress-text').textContent = `${done} / ${total} articles`;
  document.getElementById('mob-progress-fill').style.width = total ? (done/total*100)+'%' : '0%';
  if (done > 0 && done >= total) {
    document.getElementById('mob-done-banner').style.display = 'block';
  }
}

function validateMobile() {
  const checkedIds = Object.keys(mobChecked).filter(id => mobChecked[id]);
  if (checkedIds.length === 0) {
    toast('Aucun article coché');
    return;
  }
  if (!confirm('Terminer les courses ?\n\n' + checkedIds.length + ' article(s) seront ajoutés à l\'inventaire.')) return;
  checkedIds.forEach(id => {
    const item = items.find(i => i.id === id);
    if (item) item.qty = item.qty + (mobTakeQty[id] || 1);
  });
  save();
  mobClearState();
  document.getElementById('mobile-overlay').classList.remove('open');
  document.documentElement.style.overflow = '';
  render();
  toast(checkedIds.length + ' article(s) ajouté(s) à l\'inventaire');
}

function closeMobile() {
  const checkedIds = Object.keys(mobChecked).filter(id => mobChecked[id]);
  if (checkedIds.length > 0) {
    const rep = confirm('Sauvegarder les coches avant de fermer ?');
    if (rep) {
      // Garde les coches dans localStorage, ferme sans toucher au stock
      mobSaveState();
    } else {
      // Efface tout
      mobClearState();
    }
  }
  document.getElementById('mobile-overlay').classList.remove('open');
  document.documentElement.style.overflow = '';
}

// ── Toast ─────────────────────────────────────────────────────────────────
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2500);
}

// ── Keyboard shortcuts ────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key==='Escape') closeModal();
  if (e.key==='Enter' && document.getElementById('overlay').classList.contains('open')
      && document.activeElement.id !== 'f-store-input') saveItem();
  if (e.key==='n' && !document.getElementById('overlay').classList.contains('open')
      && e.target.tagName !== 'INPUT') openModal();
});

// ── Init ──────────────────────────────────────────────────────────────────
load();
render();
</script>
</body>
</html>
